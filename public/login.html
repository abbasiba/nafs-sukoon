<!DOCTYPE html>
<html dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نفس سکون - اسلامی نفسیاتی معاون</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Urdu Typesetting', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 40px; padding: 35px 25px; max-width: 450px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #0f172a; margin-bottom: 10px; font-size: 32px; }
        .sub { text-align: center; color: #64748b; margin-bottom: 30px; font-size: 14px; }
        .quran-line { text-align: center; color: #1e3a5f; font-size: 13px; margin-bottom: 25px; font-style: italic; }
        .tab { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 16px; cursor: pointer; color: #64748b; transition: all 0.3s; font-weight: 600; }
        .tab-btn.active { color: #1e3a5f; border-bottom: 2px solid #1e3a5f; margin-bottom: -2px; }
        .form { display: none; }
        .form.active { display: block; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 20px; font-size: 16px; background: #f8fafc; }
        input:focus, select:focus { outline: none; border-color: #1e3a5f; }
        button { width: 100%; padding: 14px; background: #1e3a5f; color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background: #0f172a; }
        .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 16px; margin-top: 15px; text-align: center; display: none; }
        .footer { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #e2e8f0; color: #94a3b8; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 نفس سکون</h1>
        <div class="sub">نفسیات · قرآن · سنت</div>
        <div class="quran-line">"بیشک یادِ اللہ سے دلوں کو اطمینان ملتا ہے"</div>
        
        <div class="tab">
            <button class="tab-btn active" onclick="showTab('login')">لاگ ان</button>
            <button class="tab-btn" onclick="showTab('register')">رجسٹر</button>
        </div>
        
        <div id="login-form" class="form active">
            <input type="text" id="login-username" placeholder="یوزر نام">
            <input type="password" id="login-password" placeholder="پاس ورڈ">
            <button onclick="handleLogin()">🔓 لاگ ان کریں</button>
        </div>
        
        <div id="register-form" class="form">
            <input type="text" id="reg-username" placeholder="یوزر نام">
            <input type="password" id="reg-password" placeholder="پاس ورڈ">
            <input type="text" id="reg-name" placeholder="آپ کا نام">
            <input type="number" id="reg-age" placeholder="عمر">
            <select id="reg-gender">
                <option value="">صنف منتخب کریں</option>
                <option value="male">👨 مرد</option>
                <option value="female">👩 خاتون</option>
            </select>
            <button onclick="handleRegister()">📝 رجسٹر کریں</button>
        </div>
        
        <div id="error-box" class="error"></div>
        <div class="footer">🤲 "رَبِّ اشْرَحْ لِي صَدْرِي"</div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('login-form').classList.toggle('active', tab === 'login');
            document.getElementById('register-form').classList.toggle('active', tab === 'register');
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
            document.getElementById('error-box').style.display = 'none';
        }
        
        function showError(msg) {
            const box = document.getElementById('error-box');
            box.textContent = msg;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 4000);
        }
        
        async function handleLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            if(!username || !password) return showError('براہ کرم تمام فیلڈز بھریں');
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if(data.success) window.location.href = '/';
            else showError(data.error || 'لاگ ان ناکام');
        }
        
        async function handleRegister() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const name = document.getElementById('reg-name').value;
            const age = document.getElementById('reg-age').value;
            const gender = document.getElementById('reg-gender').value;
            if(!username || !password || !name || !age || !gender) return showError('تمام فیلڈز بھریں');
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password, name, age, gender})
            });
            const data = await res.json();
            if(data.success) window.location.href = '/';
            else showError(data.error || 'رجسٹریشن ناکام');
        }
    </script>
</body>
</html>
